<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMJ Music</title>
    <meta name="theme-color" content="#ff0000">
    <meta name="description" content="Ouça suas músicas do YouTube.">
    <!-- Manifesto do PWA -->
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #0f0f0f; color: #fff; padding: 20px; }
        .logo { text-align: center; font-size: 2.5em; color: #ff0000; margin: 20px 0; font-weight: bold; }
        .search-box { display: flex; margin: 30px auto; max-width: 600px; }
        #searchInput { flex: 1; padding: 15px; border: none; border-radius: 30px 0 0 30px; background: #222; color: #fff; }
        #searchButton { padding: 15px 25px; border: none; background: #ff0000; color: white; border-radius: 0 30px 30px 0; cursor: pointer; }
        #results { max-width: 800px; margin: 20px auto; }
        .music-item { background: #222; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; align-items: center; cursor: pointer; }
        .music-item img { width: 60px; height: 60px; border-radius: 5px; margin-right: 15px; }
        #player { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.95); padding: 15px; display: none; text-align: center; border-top: 2px solid #ff0000; }
        #nowPlaying { margin-bottom: 10px; font-weight: bold; }
        #audioPlayer { width: 80%; margin: 10px auto; display: block; }
        .status { padding: 10px; background: #ff0000; color: white; position: fixed; top: 10px; right: 10px; border-radius: 5px; display: none; }
    </style>
</head>
<body>
    <div class="logo">MMJ MUSIC</div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar música...">
        <button id="searchButton">Buscar</button>
    </div>
    <div id="results"></div>
    <div id="player">
        <div id="nowPlaying">Tocando agora: <span id="songTitle"></span></div>
        <!-- O elemento de áudio é ESSENCIAL -->
        <audio id="audioPlayer" controls></audio>
    </div>
    <div id="status" class="status">Reproduzindo em background...</div>

    <script>
        const API_KEY = 'AIzaSyBe89OpBYTdOhjzL4eej7dLms7LJ_9sYg8';
        let currentAudio = document.getElementById('audioPlayer');

        // 1. BUSCAR MÚSICAS (YouTube Data API)
        async function searchMusic(query) {
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=10&q=${encodeURIComponent(query + ' música')}&type=video&key=${API_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            showResults(data.items);
        }
        function showResults(items) {
            const container = document.getElementById('results');
            container.innerHTML = '';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'music-item';
                div.innerHTML = `<img src="${item.snippet.thumbnails.default.url}"><div><strong>${item.snippet.title}</strong><br><small>${item.snippet.channelTitle}</small></div>`;
                div.onclick = () => playSong(item);
                container.appendChild(div);
            });
        }

        // 2. TOCAR MÚSICA (Elemento <audio> + Media Session API)
        async function playSong(song) {
            // A. Obter URL de áudio direto (via serviço proxy/publico - exemplo)
            // EM PRODUÇÃO: Use um backend para extrair o áudio do YouTube.
            const audioStreamUrl = await getAudioStreamUrl(song.id.videoId);

            // B. Configurar e tocar no elemento <audio>
            currentAudio.src = audioStreamUrl;
            document.getElementById('player').style.display = 'block';
            document.getElementById('songTitle').textContent = song.snippet.title;

            // Inicia a reprodução
            await currentAudio.play();

            // C. CONFIGURAÇÃO CRÍTICA: Media Session API[citation:4]
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: song.snippet.title,
                    artist: song.snippet.channelTitle,
                    album: 'MMJ Music',
                    artwork: [
                        { src: song.snippet.thumbnails.default.url, sizes: '96x96', type: 'image/jpeg' }
                    ]
                });

                // Conectar os botões de notificação/tela bloqueada
                navigator.mediaSession.setActionHandler('play', () => currentAudio.play());
                navigator.mediaSession.setActionHandler('pause', () => currentAudio.pause());
                // Forçar o sistema a ver o estado como "playing"
                navigator.mediaSession.playbackState = 'playing';
            }

            showStatus('Tocando em background...');
        }

        // 3. Função para obter stream de áudio (SIMPLIFICADA)
        async function getAudioStreamUrl(videoId) {
            // ATENÇÃO: Esta é uma solução simplificada para demonstração.
            // O YouTube não oferece URLs de áudio diretos pela sua API pública.
            // Em um projeto real, você precisa de um backend próprio para extrair e servir o áudio.
            // Exemplo de endpoint de um serviço público (pode parar de funcionar):
            return `https://corsproxy.io/?https://www.youtube.com/watch?v=${videoId}`;
        }

        // 4. Mostrar status
        function showStatus(text) {
            const status = document.getElementById('status');
            status.textContent = text;
            status.style.display = 'block';
            setTimeout(() => status.style.display = 'none', 3000);
        }

        // Event Listeners
        document.getElementById('searchButton').onclick = () => {
            const query = document.getElementById('searchInput').value;
            if (query) searchMusic(query);
        };
        document.getElementById('searchInput').onkeypress = (e) => {
            if (e.key === 'Enter') document.getElementById('searchButton').click();
        };

        // 5. Registrar Service Worker para o PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker registrado para background play.'))
                .catch(err => console.log('Erro SW:', err));
        }
        // Detectar se está rodando como PWA instalado
        if (window.matchMedia('(display-mode: standalone)').matches) {
            console.log('MMJ Music rodando como PWA instalado.');
        }
    </script>
</body>
</html>
