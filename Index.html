    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* TELA INICIAL */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #000428, #004e92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .radio-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-title {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #1DB954, #1ED760);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(29, 185, 84, 0.5);
            letter-spacing: 2px;
        }

        .logo-subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .radio-animation {
            width: 100px;
            height: 100px;
            margin: 30px auto;
            position: relative;
        }

        .radio-circle {
            width: 100px;
            height: 100px;
            border: 4px solid #1DB954;
            border-radius: 50%;
            position: absolute;
            animation: pulse 2s infinite;
        }

        .radio-circle:nth-child(2) {
            animation-delay: 0.5s;
            opacity: 0.7;
            border-color: #1ED760;
        }

        .radio-circle:nth-child(3) {
            animation-delay: 1s;
            opacity: 0.4;
            border-color: #00FF88;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #1DB954;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* PLAYER PRINCIPAL */
        .player-container {
            max-width: 400px;
            width: 100%;
            text-align: center;
            display: none;
        }

        .radio-header {
            margin-bottom: 30px;
        }

        .radio-name {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #1DB954, #1ED760);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 5px;
        }

        .radio-status {
            color: #1DB954;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #FF0000;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* CAPA DA MÚSICA */
        .album-art-container {
            position: relative;
            margin-bottom: 30px;
        }

        .album-art {
            width: 280px;
            height: 280px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            margin: 0 auto;
            display: block;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .vinyl-effect {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: conic-gradient(
                transparent 0deg,
                rgba(29, 185, 84, 0.1) 90deg,
                transparent 180deg,
                rgba(30, 215, 96, 0.1) 270deg
            );
            animation: rotate 20s linear infinite;
            pointer-events: none;
        }

        @keyframes rotate {
            from { transform: translateX(-50%) rotate(0deg); }
            to { transform: translateX(-50%) rotate(360deg); }
        }

        /* INFORMAÇÕES DA MÚSICA */
        .song-info {
            margin-bottom: 30px;
            padding: 0 20px;
        }

        .song-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: white;
            line-height: 1.3;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .song-artist {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }

        .song-album {
            font-size: 0.9rem;
            color: #1DB954;
            font-style: italic;
        }

        /* CONTROLES */
        .player-controls {
            margin-bottom: 30px;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-bottom: 20px;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .play-btn {
            background: #1DB954;
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
        }

        .play-btn:hover {
            background: #1ED760;
            transform: scale(1.1);
        }

        /* BARRA DE PROGRESSO */
        .progress-container {
            margin: 20px 0;
            padding: 0 20px;
        }

        .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            cursor: pointer;
            margin-bottom: 5px;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, #1DB954, #1ED760);
            width: 0%;
            border-radius: 2px;
            transition: width 0.1s;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        /* VOLUME */
        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .volume-slider {
            width: 120px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #1DB954;
            cursor: pointer;
        }

        /* BOTÃO DE INSTALAÇÃO */
        .install-btn {
            background: #1DB954;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 8px;
            margin: 20px auto 0;
            transition: all 0.3s;
        }

        .install-btn:hover {
            background: #1ED760;
            transform: scale(1.05);
        }

        /* RESPONSIVO */
        @media (max-width: 480px) {
            .logo-title {
                font-size: 2.5rem;
            }
            
            .album-art {
                width: 250px;
                height: 250px;
            }
            
            .vinyl-effect {
                width: 250px;
                height: 250px;
            }
            
            .song-title {
                font-size: 1.3rem;
                min-height: 50px;
            }
            
            .control-buttons {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- TELA DE CARREGAMENTO -->
    <div class="loading-screen" id="loadingScreen">
        <div class="radio-logo">
            <h1 class="logo-title">RÁDIO GOSPEL</h1>
            <p class="logo-subtitle">LITORAL</p>
        </div>
        
        <div class="radio-animation">
            <div class="radio-circle"></div>
            <div class="radio-circle"></div>
            <div class="radio-circle"></div>
        </div>
        
        <div class="loading-spinner"></div>
        <p style="color: rgba(255,255,255,0.7); margin-top: 20px;">Iniciando transmissão...</p>
    </div>

    <!-- PLAYER PRINCIPAL -->
    <div class="player-container" id="playerContainer">
        <div class="radio-header">
            <h2 class="radio-name">RÁDIO GOSPEL</h2>
            <div class="radio-status">
                <div class="live-dot"></div>
                <span>AO VIVO • 24H LOUVOR</span>
            </div>

        <!-- CAPA DA MÚSICA -->
        <div class="album-art-container">
            <img id="albumArt" src="https://images.unsplash.com/photo-1518609878373-06d740f60d8b?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80" 
                 alt="Capa do Álbum" class="album-art">

        <!-- INFORMAÇÕES DA MÚSICA -->
        <div class="song-info">
            <div id="songTitle" class="song-title">Carregando música de louvor...</div>
            <div id="songArtist" class="song-artist">Rádio Gospel Litoral</div>
            <div id="songAlbum" class="song-album">Louvor e Adoração</div>
        </div>

        <!-- CONTROLES DO PLAYER -->
        <div class="player-controls">
            <div class="control-buttons">
                <button class="control-btn" id="prevBtn" title="Música anterior">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button class="control-btn play-btn" id="playBtn" title="Play/Pause">
                    <i class="fas fa-play" id="playIcon"></i>

                    <span id="currentTime">0:00</span>

                <i class="fas fa-volume-down" style="color: rgba(255,255,255,0.6);"></i>
                <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="70">

        <!-- BOTÃO DE INSTALAÇÃO PWA -->
        <button class="install-btn" id="installBtn">

    <!-- ELEMENTO DE ÁUDIO -->
    <audio id="audioPlayer" preload="auto" style="display: none;"></audio>

    <script>
        // 🔑 SUA CHAVE DA API DO YOUTUBE
        const API_KEY = 'AIzaSyBe89OpBYTdOhjzL4eej7dLms7LJ_9sYg8';
        
        // Elementos DOM
        const loadingScreen = document.getElementById('loadingScreen');
        const playerContainer = document.getElementById('playerContainer');
        const installBtn = document.getElementById('installBtn');
        const albumArt = document.getElementById('albumArt');
        const songTitle = document.getElementById('songTitle');
        const songArtist = document.getElementById('songArtist');
        const songAlbum = document.getElementById('songAlbum');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const currentTime = document.getElementById('currentTime');
        const duration = document.getElementById('duration');
        const volumeSlider = document.getElementById('volumeSlider');
        const audioPlayer = document.getElementById('audioPlayer');
        
        // Estado global
        let currentSong = null;
        let isPlaying = false;
        let gospelSongs = [];
        let currentSongIndex = 0;
        let progressInterval = null;
        let deferredPrompt = null;
        
        // Lista fixa de músicas gospel (sem busca)
        const gospelPlaylist = [
            {
                title: "Oceans (Where Feet May Fail)",
                artist: "Hillsong UNITED",
                album: "Zion",
                videoId: "xy3K_fundic",
                image: "https://images.unsplash.com/photo-1518609878373-06d740f60d8b?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80"
            },
            {
                title: "What a Beautiful Name",
                artist: "Hillsong Worship",
                album: "Let There Be Light",
                videoId: "nQWFzMvCfLE",
                image: "https://images.unsplash.com/photo-1511379938547-c1f69419868d?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80"
            },
            {
                title: "Good Good Father",
                artist: "Chris Tomlin",
                album: "Never Lose Sight",
                videoId: "CqybaN08QW8",
                image: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80"
            },
            {
                title: "Reckless Love",
                artist: "Cory Asbury",
                album: "Reckless Love",
                videoId: "Sc6SSHuZvQE",
                image: "https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80"
            },
            {
                title: "No Longer Slaves",
                artist: "Bethel Music",
                album: "We Will Not Be Shaken",
                videoId: "f8TkUMJtK5k",
                image: "https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80"
            }
        ];
        
        // Inicialização
        window.addEventListener('load', async () => {
            console.log('🎵 Rádio Gospel Litoral - Iniciando...');
            
            // Registrar Service Worker para PWA
            if ('serviceWorker' in navigator) {
                try {
                    await navigator.serviceWorker.register('service-worker.js');
                    console.log('✅ Service Worker registrado');
                } catch (error) {
                    console.log('⚠️ Service Worker não registrado:', error);
                }
            }
            
            // Configurar PWA install prompt
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                installBtn.style.display = 'flex';
                console.log('📱 PWA disponível para instalação');
            });
            
            // Quando instalado
            window.addEventListener('appinstalled', () => {
                console.log('✅ PWA instalado com sucesso');
                installBtn.style.display = 'none';
            });
            
            // Inicializar playlist
            gospelSongs = [...gospelPlaylist];
            
            // Mostrar player após 2 segundos
            setTimeout(() => {
                loadingScreen.classList.add('hidden');
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    playerContainer.style.display = 'block';
                    
                    // Tocar música aleatória automaticamente
                    playRandomSong();
                }, 500);
            }, 2000);
        });
        
        // Tocar música aleatória
        function playRandomSong() {
            if (gospelSongs.length === 0) return;
            
            // Escolher música aleatória
            currentSongIndex = Math.floor(Math.random() * gospelSongs.length);
            const song = gospelSongs[currentSongIndex];
            
            console.log(`🎵 Tocando: ${song.title}`);
            playSong(song);
        }
        
        // Tocar música específica
        async function playSong(song) {
            currentSong = song;
            
            // Atualizar UI
            songTitle.textContent = song.title;
            songArtist.textContent = song.artist;
            songAlbum.textContent = song.album;
            albumArt.src = song.image;
            
            // Iniciar reprodução
            await playAudio(song.videoId);
            
            // Configurar Media Session API para notificações
            setupMediaSession(song);
        }
        
        // Reproduzir áudio do YouTube
        async function playAudio(videoId) {
            try {
                // Parar áudio atual
                audioPlayer.pause();
                audioPlayer.src = '';
                
     // Usar serviço proxy para áudio do YouTube
                const proxyUrl = `https://corsproxy.io/?https://www.youtube.com/watch?v=${videoId}`;
                
                audioPlayer.src = proxyUrl;
                audioPlayer.load();
                audioPlayer.volume = volumeSlider.value / 100;
                
                // Aguardar carregamento
                await new Promise((resolve) => {
                    const timeout = setTimeout(resolve, 1000);
                    audioPlayer.addEventListener('canplay', () => {
                        clearTimeout(timeout);
                        resolve();
                    }, { once: true });
                });
                
                // Iniciar reprodução
                await audioPlayer.play();
                isPlaying = true;
                updatePlayIcons();
                startProgressUpdater();
                
                console.log('✅ Áudio reproduzindo');
                
            } catch (error) {
                console.error('❌ Erro ao reproduzir:', error);
                
                // Modo simulado para demonstração
                isPlaying = true;
                updatePlayIcons();
                startSimulatedProgress();
            }
        }
        
        // Configurar Media Session API para notificações e tela bloqueada
        function setupMediaSession(song) {
            if (!('mediaSession' in navigator)) {
                console.log('⚠️ Media Session API não suportada');
                return;
            }
            
            try {
                // Configurar metadados para notificação
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: song.title,
                    artist: song.artist,
                    album: 'Rádio Gospel Litoral',
                    artwork: [
                        { src: song.image, sizes: '96x96', type: 'image/jpeg' },
                        { src: song.image, sizes: '128x128', type: 'image/jpeg' },
                        { src: song.image, sizes: '192x192', type: 'image/jpeg' },
                        { src: song.image, sizes: '256x256', type: 'image/jpeg' },
                        { src: song.image, sizes: '384x384', type: 'image/jpeg' },
                        { src: song.image, sizes: '512x512', type: 'image/jpeg' }
                    ]
                });
                
                // Configurar controles para background play
                navigator.mediaSession.setActionHandler('play', async () => {
                    if (audioPlayer.src) {
                        await audioPlayer.play();
                        isPlaying = true;
                        updatePlayIcons();
                        startProgressUpdater();
                        navigator.mediaSession.playbackState = 'playing';
                    }
                });
                
                navigator.mediaSession.setActionHandler('pause', () => {
                    if (audioPlayer.src) {
                        audioPlayer.pause();
                        isPlaying = false;
                        updatePlayIcons();
                        stopProgressUpdater();
                        navigator.mediaSession.playbackState = 'paused';
                    }
                });
                
                navigator.mediaSession.setActionHandler('previoustrack', () => {
                    playPreviousSong();
                });
                
                navigator.mediaSession.setActionHandler('nexttrack', () => {
                    playNextSong();
                });
                
                // Configurar seek (avançar/retroceder)
                navigator.mediaSession.setActionHandler('seekbackward', (details) => {
                    const skipTime = details.seekOffset || 10;
                    const newTime = Math.max(audioPlayer.currentTime - skipTime, 0);
                    audioPlayer.currentTime = newTime;
                    updateProgress();
                });
                
                navigator.mediaSession.setActionHandler('seekforward', (details) => {
                    const skipTime = details.seekOffset || 10;
                    const newTime = Math.min(audioPlayer.currentTime + skipTime, audioPlayer.duration);
                    audioPlayer.currentTime = newTime;
                    updateProgress();
                });
                
                // Forçar estado inicial como playing
                navigator.mediaSession.playbackState = 'playing';
                
                console.log('✅ Media Session configurada para background play');
                
            } catch (error) {
                console.log('⚠️ Algumas ações do Media Session não suportadas:', error);
            }
        }
        
        // Atualizar ícones de play/pause
        function updatePlayIcons() {
            if (isPlaying) {
                playIcon.className = 'fas fa-pause';
            } else {
                playIcon.className = 'fas fa-play';
            }
        }
        
        // Alternar play/pause
        async function togglePlayPause() {
            if (!currentSong) {
                playRandomSong();
                return;
            }
            
            if (isPlaying) {
                audioPlayer.pause();
                isPlaying = false;
                updatePlayIcons();
                stopProgressUpdater();
                
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.playbackState = 'paused';
                }
                
            } else {
                try {
                    await audioPlayer.play();
                    isPlaying = true;
                    updatePlayIcons();
                    startProgressUpdater();
                    
                    if ('mediaSession' in navigator) {
                        navigator.mediaSession.playbackState = 'playing';
                    }
                    
                } catch (error) {
                    console.error('❌ Erro ao retomar:', error);
                }
            }
        }
        
        // Música anterior
        function playPreviousSong() {
            if (gospelSongs.length === 0) return;
            
            currentSongIndex = (currentSongIndex - 1 + gospelSongs.length) % gospelSongs.length;
            playSong(gospelSongs[currentSongIndex]);
        }
        
        // Próxima música
        function playNextSong() {
            if (gospelSongs.length === 0) return;
            
            currentSongIndex = (currentSongIndex + 1) % gospelSongs.length;
            playSong(gospelSongs[currentSongIndex]);
        }
        
        // Barra de progresso
        function startProgressUpdater() {
            stopProgressUpdater();
            progressInterval = setInterval(updateProgress, 1000);
        }
        
        function stopProgressUpdater() {
            if (progressInterval) {
                clearInterval(progressInterval);
            }
        }
        
        function updateProgress() {
            if (!audioPlayer.src || !isPlaying) return;
            
            try {
                const current = audioPlayer.currentTime;
                const total = audioPlayer.duration;
                
                if (total > 0 && !isNaN(total)) {
                    const percent = (current / total) * 100;
                    progress.style.width = percent + '%';
                    
                    currentTime.textContent = formatTime(current);
                    duration.textContent = formatTime(total);
                }
            } catch (e) {
                console.log('⚠️ Erro no progresso:', e);
            }
        }
        
        function startSimulatedProgress() {
            let simulatedTime = 0;
            stopProgressUpdater();
            progressInterval = setInterval(() => {
                simulatedTime += 1;
                const percent = (simulatedTime % 240) / 2.4; // 4 minutos
                progress.style.width = percent + '%';
                currentTime.textContent = formatTime(simulatedTime % 240);
                duration.textContent = '4:00';
            }, 1000);
        }
        
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
        
        // Event Listeners
        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            
            if (outcome === 'accepted') {
                installBtn.style.display = 'none';
            }
            
            deferredPrompt = null;
        });
        
        playBtn.addEventListener('click', togglePlayPause);
        prevBtn.addEventListener('click', playPreviousSong);
        nextBtn.addEventListener('click', playNextSong);
        
        progressBar.addEventListener('click', (e) => {
            if (!audioPlayer.src || !audioPlayer.duration) return;
            
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            const newTime = percent * audioPlayer.duration;
            
            audioPlayer.currentTime = newTime;
            updateProgress();
        });
        
        volumeSlider.addEventListener('input', (e) => {
            const volume = e.target.value / 100;
            audioPlayer.volume = volume;
        });
        
        // Quando o áudio termina
        audioPlayer.addEventListener('ended', () => {
            console.log('⏭️ Música terminada, próxima...');
            playNextSong();
        });
        
        // PREVENIR PAUSA AUTOMÁTICA - ESSENCIAL PARA BACKGROUND PLAY
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && isPlaying) {
                console.log('📱 App em background - Mantendo reprodução...');
                
                // Forçar Media Session a manter estado de playing
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.playbackState = 'playing';
                }
                
                // Enviar mensagem para Service Worker
                if (navigator.serviceWorker?.controller) {
                    navigator.serviceWorker.controller.postMessage({
                        type: 'PLAYING_IN_BACKGROUND',
                        song: currentSong?.title || 'Rádio Gospel'
                    });
                }
            }
        });
        
        // Teclas de atalho
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case ' ':
                case 'Spacebar':
                    e.preventDefault();
                    togglePlayPause();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    playPreviousSong();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    playNextSong();
                    break;
            }
        });
        
        // Atualizar música automaticamente a cada 5 minutos
        setInterval(() => {
            if (isPlaying && gospelSongs.length > 0) {
                playNextSong();
            }
        }, 5 * 60 * 1000); // 5 minutos
    </script>
</body>
</html>
